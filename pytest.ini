[pytest]
# =====================================================
# ASYNC CONFIG (FIX FOR pytest-asyncio 0.21 + pytest 9)
# =====================================================

asyncio_mode = auto

# IMPORTANT FIX:
# Avoid FixtureDef.unittest error in pytest-asyncio 0.21+
asyncio_default_fixture_loop_scope = function
asyncio_default_test_loop_scope = function

# =====================================================
# WARNINGS CONTROL
# =====================================================
filterwarnings =
    ignore::pydantic.PydanticDeprecatedSince20
    ignore::pytest.PytestRemovedIn9Warning
    ignore::DeprecationWarning

# =====================================================
# GENERAL SETTINGS
# =====================================================
testpaths = tests
addopts = -ra -q