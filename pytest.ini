[pytest]
# =====================================================
# ASYNC CONFIG (STABLE FOR pytest 9 + pytest-asyncio 1.x)
# =====================================================

asyncio_mode = auto

# IMPORTANT:
# Prevents FixtureDef.unittest crash in async fixture resolution

# =====================================================
# TEST DISCOVERY
# =====================================================
testpaths = tests

# =====================================================
# OUTPUT / UX
# =====================================================
addopts = -ra -q

# =====================================================
# WARNINGS CONTROL
# =====================================================
filterwarnings =
    ignore::pydantic.PydanticDeprecatedSince20
    ignore::pytest.PytestRemovedIn9Warning
    ignore::DeprecationWarning